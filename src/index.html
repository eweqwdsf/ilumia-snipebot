<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ILUMIA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #030303;
  --surface:     rgba(255,255,255,0.03);
  --surface-hi:  rgba(255,255,255,0.055);
  --border:      rgba(255,255,255,0.07);
  --border-hi:   rgba(255,255,255,0.14);
  --shine:       rgba(255,255,255,0.06);
  --text-hi:     #f0f0f0;
  --text-mid:    rgba(255,255,255,0.38);
  --text-lo:     rgba(255,255,255,0.13);
  --ok:          #5a9e6f;
  --err:         #9e5a5a;
  --mono:        'JetBrains Mono', monospace;
  --sans:        'Syne', 'Helvetica Neue', sans-serif;
}

html, body {
  width: 720px; height: 580px;
  overflow: hidden;
  background: var(--bg);
  color: var(--text-hi);
  font-family: var(--sans);
  user-select: none;
  -webkit-app-region: drag;
}

/* ── Canvas layers ─────────────────────────────────────── */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}
#sphere-canvas {
  position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none;
}

/* ── Titlebar ──────────────────────────────────────────── */
#titlebar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 38px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  z-index: 200;
}
#titlebar-left {
  display: none;
}
#titlebar-right {
  display: flex; gap: 6px;
  -webkit-app-region: no-drag;
}
.wb {
  cursor: pointer;
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-lo);
  font-size: 10px;
  transition: all .18s;
}
#btn-minimize:hover { color: rgba(255,255,255,0.55); border-color: var(--border-hi); background: var(--surface-hi); }
#btn-minimize:focus { outline: none; }
#btn-close:hover    { color: #b06060; border-color: rgba(160,80,80,0.35); background: rgba(140,50,50,0.08); }
#btn-close:focus    { outline: none; }

/* ── App container ─────────────────────────────────────── */
#app {
  position: relative; z-index: 10;
  width: 720px; height: 580px;
  display: flex; flex-direction: column; align-items: center;
}

/* ── Hero ──────────────────────────────────────────────── */
#hero {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  padding-top: 185px;
}
#hero-title {
  font-size: 28px; font-weight: 800;
  letter-spacing: 0.40em;
  color: var(--text-hi);
  text-transform: uppercase;
  line-height: 1;
}
.hero-sub-row {
  display: flex; align-items: center; gap: 0;
  margin-top: 7px;
}
.hero-rule {
  width: 32px; height: 1px;
  background: var(--border);
}
#hero-sub {
  font-family: var(--mono);
  font-size: 7.5px; font-weight: 300;
  letter-spacing: 0.46em;
  color: var(--text-lo);
  text-transform: uppercase;
  padding: 0 10px;
}

/* ── Screens ───────────────────────────────────────────── */
#screens {
  position: relative; z-index: 2;
  margin-top: 110px;
  width: 100%;
  display: flex; justify-content: center;
}
.screen { display: none; flex-direction: column; align-items: center; }
#screen-key.active,
#screen-configs.active,
#screen-filters.active { margin-top: -30px; }
.screen.active { display: flex; animation: fadeIn .28s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Panel ─────────────────────────────────────────────── */
.panel {
  width: 380px;
  background: rgba(255,255,255,0.018);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 26px 30px 22px;
  display: flex; flex-direction: column; align-items: center;
  position: relative;
  backdrop-filter: blur(2px);
}
/* top-edge shine */
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 12%; right: 12%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--shine) 40%, var(--shine) 60%, transparent);
  pointer-events: none;
}
/* corner ticks */
.ctick {
  position: absolute;
  width: 7px; height: 7px;
  border-color: var(--border-hi);
  border-style: solid;
  border-width: 0;
}
.ctick.tl { top: -1px; left: -1px;  border-top-width: 1px; border-left-width: 1px; }
.ctick.tr { top: -1px; right: -1px; border-top-width: 1px; border-right-width: 1px; }
.ctick.bl { bottom: -1px; left: -1px;  border-bottom-width: 1px; border-left-width: 1px; }
.ctick.br { bottom: -1px; right: -1px; border-bottom-width: 1px; border-right-width: 1px; }

/* ── Panel typography ──────────────────────────────────── */
.panel-title {
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.16em;
  color: rgba(255,255,255,0.75);
  text-transform: uppercase;
}
.panel-sub {
  font-family: var(--mono);
  font-size: 7.5px; font-weight: 300;
  color: var(--text-lo);
  letter-spacing: 0.18em;
  margin-top: 5px;
  text-transform: uppercase;
}
.sep {
  width: 100%; height: 1px;
  background: var(--border);
  margin: 16px 0;
}
.sep-sm { margin: 10px 0; }

/* ── Buttons ───────────────────────────────────────────── */
.btn {
  -webkit-app-region: no-drag;
  cursor: pointer;
  width: 210px;
  padding: 11px 20px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-mid);
  font-family: var(--sans);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  border-radius: 999px;
  transition: border-color .18s, color .18s, background .18s;
  margin-top: 9px;
}
.btn:hover {
  border-color: var(--border-hi);
  color: rgba(255,255,255,0.62);
  background: var(--surface-hi);
}
.btn.primary {
  background: #ffffff;
  border-color: #ffffff;
  color: #000000;
  font-weight: 700;
}
.btn.primary:hover {
  background: rgba(255,255,255,0.88);
  border-color: rgba(255,255,255,0.88);
  color: #000000;
}
.btn.sm { width: 160px; font-size: 10px; }
.btn-row { display: flex; gap: 10px; margin-top: 9px; }

/* ── Input ─────────────────────────────────────────────── */
.key-input {
  -webkit-app-region: no-drag;
  width: 100%;
  padding: 13px 18px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: rgba(255,255,255,0.88);
  font-family: var(--mono);
  font-size: 11px; font-weight: 400;
  border-radius: 0;
  outline: none;
  margin-top: 18px;
  transition: border-color .22s;
  letter-spacing: 0.14em;
  text-align: center;
  text-transform: uppercase;
  caret-color: rgba(255,255,255,0.55);
}
.key-input::placeholder {
  color: rgba(255,255,255,0.14);
  font-weight: 300;
  letter-spacing: 0.18em;
}
.key-input:focus { border-bottom-color: rgba(255,255,255,0.30); }

/* ── HWID box ──────────────────────────────────────────── */
.hwid-box {
  width: 100%;
  padding: 16px 18px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-top: 16px;
  transition: border-color 0.2s;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.hwid-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.hwid-label {
  font-family: var(--mono);
  font-size: 7.5px;
  font-weight: 400;
  color: rgba(255,255,255,0.28);
  letter-spacing: 0.24em;
  text-transform: uppercase;
  flex-shrink: 0;
  width: 36px;
}
.hwid-value {
  flex: 1;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 400;
  color: rgba(255,255,255,0.78);
  letter-spacing: 0.08em;
  word-break: break-all;
  text-align: left;
}
.hwid-divider {
  height: 1px;
  background: var(--border);
  opacity: 0.6;
}
.hwid-box.loading {
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  text-align: center;
  letter-spacing: 0.18em;
  padding: 22px 18px;
  display: block;
}
.hwid-box.error {
  color: var(--err);
  text-align: center;
  font-family: var(--mono);
  font-size: 10px;
  padding: 22px 18px;
  display: block;
  letter-spacing: 0.14em;
}

/* ── Status ────────────────────────────────────────────── */
.status {
  font-family: var(--sans);
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.06em;
  min-height: 18px;
  margin-top: 9px;
  text-align: center;
}
.status.ok  { color: #6ab87e; }
.status.err { color: #c47070; }

/* ── Tag chips ─────────────────────────────────────────── */
.tag {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px 2px 7px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 5px;
  font-family: var(--mono);
  font-size: 8.5px;
  color: rgba(255,255,255,0.62);
  letter-spacing: 0.05em;
  cursor: default;
  -webkit-app-region: no-drag;
}
.tag-x {
  cursor: pointer;
  color: rgba(255,255,255,0.22);
  font-size: 10px;
  line-height: 1;
  margin-left: 1px;
  transition: color .12s;
}
.tag-x:hover { color: #c47070; }

/* ── Config cards ──────────────────────────────────────── */
.config-card {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  cursor: pointer;
  transition: border-color .20s, background .20s;
  -webkit-app-region: no-drag;
}
.config-card:hover { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.025); }
.config-card.active {
  border-color: rgba(78,255,145,0.20);
  background: rgba(78,255,145,0.03);
}
.config-card.empty {
  justify-content: center;
  color: rgba(255,255,255,0.16);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  border-style: dashed;
  border-color: rgba(255,255,255,0.05);
}
.config-card.empty:hover { border-color: rgba(255,255,255,0.10); color: rgba(255,255,255,0.30); background: transparent; }
.config-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.15); flex-shrink: 0;
}
.config-card.active .config-dot {
  background: #4eff91;
  box-shadow: 0 0 8px rgba(78,255,145,0.55);
}
.config-info { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.config-name {
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  color: rgba(255,255,255,0.78); letter-spacing: 0.04em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.config-card.active .config-name { color: rgba(255,255,255,0.92); }
.config-meta {
  font-family: var(--mono); font-size: 8px; font-weight: 300;
  color: rgba(255,255,255,0.22); letter-spacing: 0.10em; text-transform: uppercase;
}
.config-actions { display: flex; gap: 5px; flex-shrink: 0; }
.config-icon-btn {
  cursor: pointer; width: 22px; height: 22px; border-radius: 50%;
  background: transparent; border: 1px solid rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.28); font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; -webkit-app-region: no-drag;
}
.config-icon-btn:hover { border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.70); }
.config-icon-btn.danger:hover { border-color: rgba(160,80,80,0.35); color: #c47070; background: rgba(140,50,50,0.06); }

/* ── Filters status ────────────────────────────────────── */
.filters-status.ok  { color: #6ab87e !important; }
.filters-status.err { color: #c47070 !important; }

/* ── Filter editor ────────────────────────────────────── */
.fe-shell {
  position: relative;
  width: 580px;
  max-height: 420px;
  background: rgba(255,255,255,0.016);
  border: 1px solid var(--border);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-app-region: no-drag;
}
.fe-shell::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08) 50%, transparent);
  pointer-events: none;
}

/* top bar — name left, price right */
.fe-top {
  flex-shrink: 0;
  padding: 14px 22px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 20px;
}
.fe-top-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.fe-top-label {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 500;
  color: rgba(255,255,255,0.28);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.fe-name-input {
  width: 100%;
  background: transparent;
  border: none;
  color: #ffffff;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  outline: none;
  padding: 0;
  -webkit-app-region: no-drag;
}
.fe-name-input::placeholder { color: rgba(255,255,255,0.15); font-weight: 400; }

.fe-top-right {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: flex-end;
}
.fe-price-row { display: flex; align-items: center; gap: 8px; }
.fe-price-field { display: flex; flex-direction: column; gap: 3px; align-items: center; }
.fe-price-label {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 500;
  color: rgba(255,255,255,0.28);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.fe-price-input {
  width: 62px;
  padding: 6px 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: #ffffff;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  outline: none;
  text-align: center;
  -webkit-app-region: no-drag;
  transition: border-color .18s, background .18s;
}
.fe-price-input:focus { border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.06); }
.fe-price-sep { color: rgba(255,255,255,0.20); font-size: 15px; margin-top: 18px; }

/* scrollable body */
.fe-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 14px 22px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.08) transparent;
}
.fe-body::-webkit-scrollbar { width: 4px; }
.fe-body::-webkit-scrollbar-track { background: transparent; }
.fe-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

/* each filter row */
.fe-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.fe-cell-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.fe-cell-label {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: 0.10em;
  text-transform: uppercase;
}
.fe-clear-btn {
  cursor: pointer;
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.22);
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 0;
  -webkit-app-region: no-drag;
  transition: color .15s;
}
.fe-clear-btn:hover { color: #c47070; }

/* dropdown container */
.fe-dropdown-wrap {
  position: relative;
  -webkit-app-region: no-drag;
}
.fe-dropdown-trigger {
  width: 100%;
  padding: 7px 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  color: rgba(255,255,255,0.35);
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.06em;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color .18s, background .18s;
  -webkit-app-region: no-drag;
}
.fe-dropdown-trigger:hover { border-color: rgba(255,255,255,0.14); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.55); }
.fe-dropdown-trigger .arrow { font-size: 8px; opacity: 0.4; transition: transform .18s; }
.fe-dropdown-trigger.open .arrow { transform: rotate(180deg); opacity: 0.7; }

.fe-dropdown-list {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  z-index: 999;
  background: #111111;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px;
  max-height: 180px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.08) transparent;
  padding: 4px;
}
.fe-dropdown-list::-webkit-scrollbar { width: 4px; }
.fe-dropdown-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
.fe-dropdown-list.open { display: block; }

.fe-dropdown-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .12s;
  -webkit-app-region: no-drag;
}
.fe-dropdown-item:hover { background: rgba(255,255,255,0.06); }
.fe-dropdown-item.selected { background: rgba(255,255,255,0.05); }
.fe-dropdown-item .check {
  width: 14px; height: 14px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  color: transparent;
  transition: background .12s, border-color .12s, color .12s;
}
.fe-dropdown-item.selected .check {
  background: rgba(255,255,255,0.90);
  border-color: rgba(255,255,255,0.90);
  color: #000;
}
.fe-dropdown-item .label {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.03em;
}
.fe-dropdown-item.selected .label { color: #ffffff; font-weight: 500; }

/* tag area (for keywords / blacklist — free text) */
.fe-tag-wrap {
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  gap: 4px;
  padding: 7px 10px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  cursor: text;
  -webkit-app-region: no-drag;
  min-height: 40px;
  transition: border-color .18s;
}
.fe-tag-wrap:focus-within { border-color: rgba(255,255,255,0.12); }
.fe-tag-wrap .tag-input {
  background: transparent;
  border: none;
  outline: none;
  color: #ffffff;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 400;
  min-width: 60px;
  flex: 1;
  -webkit-app-region: no-drag;
  padding: 1px 2px;
}
.fe-tag-wrap .tag-input::placeholder { color: rgba(255,255,255,0.14); }

/* tag chips — cleaner */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  color: #ffffff;
  letter-spacing: 0.02em;
  cursor: default;
  -webkit-app-region: no-drag;
}
.tag-x {
  cursor: pointer;
  color: rgba(255,255,255,0.28);
  font-size: 11px;
  line-height: 1;
  margin-left: 1px;
  transition: color .12s;
}
.tag-x:hover { color: #c47070; }

/* bottom bar */
.fe-bottom {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 22px;
  border-top: 1px solid var(--border);
}
.fe-bottom .filters-status {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,0.30);
  letter-spacing: 0.05em;
  flex: 1;
}
.fe-actions { display: flex; gap: 6px; flex-shrink: 0; }
.fe-actions .btn { margin-top: 0; width: auto; padding: 7px 16px; font-size: 10px; }

/* ── Version ───────────────────────────────────────────── */
.version {
  font-family: var(--mono);
  font-size: 10px; font-weight: 400;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.12em;
  margin-top: 4px;
}

/* ── Copy hint ─────────────────────────────────────────── */
.copy-hint {
  font-family: var(--mono);
  font-size: 8px; font-weight: 300;
  color: var(--ok);
  min-height: 16px;
  margin-top: 6px;
  letter-spacing: 0.12em;
  transition: opacity .3s;
}

/* ── Loading dots ──────────────────────────────────────── */
.dots-row { display: flex; align-items: center; gap: 14px; }
.dots { display: flex; gap: 5px; }
.dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--border-hi);
  animation: dotpulse 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes dotpulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40%           { opacity: 0.85; transform: scale(1); }
}

/* ── Launch check ring ─────────────────────────────────── */
.check-ring {
  display: flex; align-items: center; justify-content: center;
  color: #4eff91;
  font-size: 22px;
  margin-bottom: 12px;
  text-shadow: 0 0 12px rgba(78,255,145,0.6);
}

/* ── Social icons ──────────────────────────────────────── */
.social-icon {
  -webkit-app-region: no-drag;
  display: flex; align-items: center; justify-content: center;
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.35);
  text-decoration: none;
  transition: transform .18s, opacity .18s;
}
.social-icon:hover {
  opacity: 0.8;
  transform: scale(1.08);
}
#toast {
  position: fixed;
  top: 44px;
  right: -300px;
  z-index: 500;
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(10,10,10,0.88);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 12px 18px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  transition: right 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.6s ease;
  opacity: 0;
  pointer-events: none;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}
#toast.show {
  right: 14px;
  opacity: 1;
}
#toast.hide {
  opacity: 0;
  right: 14px;
}
.toast-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(106,184,126,0.12);
  border: 1px solid rgba(106,184,126,0.35);
  display: flex; align-items: center; justify-content: center;
  color: #6ab87e;
  font-size: 11px;
  flex-shrink: 0;
}
.toast-text {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.90);
  letter-spacing: 0.05em;
  white-space: nowrap;
}

/* ── Intro fade overlay ─────────────────────────────────── */
#intro-veil {
  position: fixed; inset: 0;
  z-index: 9999;
  background: #030303;
  pointer-events: none;
  opacity: 1;
  transition: opacity 3s cubic-bezier(0.4, 0, 0.2, 1);
}
#intro-veil.lift { opacity: 0; }

/* ── Launch info (license status) ───────────────────────── */
.launch-info-label {
  font-family: var(--mono);
  font-size: 7.5px;
  font-weight: 400;
  color: rgba(255,255,255,0.32);
  letter-spacing: 0.28em;
  text-transform: uppercase;
}
.launch-info-value {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,0.82);
  letter-spacing: 0.12em;
}
.launch-info-value .num {
  color: #ffffff;
  font-weight: 500;
}
</style>

              background:#6ab87e; margin-top:9px;
              box-shadow:0 0 10px rgba(106,184,126,0.65);
              animation:dotpulse 2s ease-in-out infinite;
            "></div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<div id="btn-back-arrow" style="
  display: none;
  position: fixed;
  top: 50%;
  left: 22px;
  transform: translateY(-50%);
  z-index: 200;
  -webkit-app-region: no-drag;
  cursor: pointer;
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.10);
  background: transparent;
  color: rgba(255,255,255,0.35);
  font-size: 16px;
  display: none;
  align-items: center;
  justify-content: center;
  transition: border-color .18s, color .18s, background .18s;
" onmouseenter="this.style.borderColor='rgba(255,255,255,0.22)';this.style.color='rgba(255,255,255,0.75)';this.style.background='rgba(255,255,255,0.05)'"
   onmouseleave="this.style.borderColor='rgba(255,255,255,0.10)';this.style.color='rgba(255,255,255,0.35)';this.style.background='transparent'">
  &#8592;
</div>

<div id="toast">
  <div class="toast-icon">✓</div>
  <div class="toast-text">Bot started successfully</div>
</div>

<div id="version-tag" class="version" style="position:fixed; bottom:18px; left:0; right:0; text-align:center; z-index:100;"></div>

<script src="renderer.js"></script>
</body>
