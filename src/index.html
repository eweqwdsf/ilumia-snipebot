<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ILUMIA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #030303;
  --surface:     rgba(255,255,255,0.03);
  --surface-hi:  rgba(255,255,255,0.055);
  --border:      rgba(255,255,255,0.07);
  --border-hi:   rgba(255,255,255,0.14);
  --shine:       rgba(255,255,255,0.06);
  --text-hi:     #f0f0f0;
  --text-mid:    rgba(255,255,255,0.38);
  --text-lo:     rgba(255,255,255,0.13);
  --ok:          #5a9e6f;
  --err:         #9e5a5a;
  --mono:        'JetBrains Mono', monospace;
  --sans:        'Syne', 'Helvetica Neue', sans-serif;
}

html, body {
  width: 720px; height: 580px;
  overflow: hidden;
  background: var(--bg);
  color: var(--text-hi);
  font-family: var(--sans);
  user-select: none;
  -webkit-app-region: drag;
}

/* ── Canvas layers ─────────────────────────────────────── */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}
#sphere-canvas {
  position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none;
}

/* ── Titlebar ──────────────────────────────────────────── */
#titlebar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 38px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  z-index: 200;
}
#titlebar-left {
  display: none;
}
#titlebar-right {
  display: flex; gap: 6px;
  -webkit-app-region: no-drag;
}
.wb {
  cursor: pointer;
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-lo);
  font-size: 10px;
  transition: all .18s;
}
#btn-minimize:hover { color: rgba(255,255,255,0.55); border-color: var(--border-hi); background: var(--surface-hi); }
#btn-minimize:focus { outline: none; }
#btn-close:hover    { color: #b06060; border-color: rgba(160,80,80,0.35); background: rgba(140,50,50,0.08); }
#btn-close:focus    { outline: none; }

/* ── App container ─────────────────────────────────────── */
#app {
  position: relative; z-index: 10;
  width: 720px; height: 580px;
  display: flex; flex-direction: column; align-items: center;
}

/* ── Hero ──────────────────────────────────────────────── */
#hero {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  padding-top: 185px;
}
#hero-title {
  font-size: 28px; font-weight: 800;
  letter-spacing: 0.40em;
  color: var(--text-hi);
  text-transform: uppercase;
  line-height: 1;
}
.hero-sub-row {
  display: flex; align-items: center; gap: 0;
  margin-top: 7px;
}
.hero-rule {
  width: 32px; height: 1px;
  background: var(--border);
}
#hero-sub {
  font-family: var(--mono);
  font-size: 7.5px; font-weight: 300;
  letter-spacing: 0.46em;
  color: var(--text-lo);
  text-transform: uppercase;
  padding: 0 10px;
}

/* ── Screens ───────────────────────────────────────────── */
#screens {
  position: relative; z-index: 2;
  margin-top: 110px;
  width: 100%;
  display: flex; justify-content: center;
}
.screen { display: none; flex-direction: column; align-items: center; }
.screen.active { display: flex; animation: fadeIn .28s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Panel ─────────────────────────────────────────────── */
.panel {
  width: 380px;
  background: rgba(255,255,255,0.018);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 26px 30px 22px;
  display: flex; flex-direction: column; align-items: center;
  position: relative;
  backdrop-filter: blur(2px);
}
/* top-edge shine */
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 12%; right: 12%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--shine) 40%, var(--shine) 60%, transparent);
  pointer-events: none;
}
/* corner ticks */
.ctick {
  position: absolute;
  width: 7px; height: 7px;
  border-color: var(--border-hi);
  border-style: solid;
  border-width: 0;
}
.ctick.tl { top: -1px; left: -1px;  border-top-width: 1px; border-left-width: 1px; }
.ctick.tr { top: -1px; right: -1px; border-top-width: 1px; border-right-width: 1px; }
.ctick.bl { bottom: -1px; left: -1px;  border-bottom-width: 1px; border-left-width: 1px; }
.ctick.br { bottom: -1px; right: -1px; border-bottom-width: 1px; border-right-width: 1px; }

/* ── Panel typography ──────────────────────────────────── */
.panel-title {
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.16em;
  color: rgba(255,255,255,0.75);
  text-transform: uppercase;
}
.panel-sub {
  font-family: var(--mono);
  font-size: 7.5px; font-weight: 300;
  color: var(--text-lo);
  letter-spacing: 0.18em;
  margin-top: 5px;
  text-transform: uppercase;
}
.sep {
  width: 100%; height: 1px;
  background: var(--border);
  margin: 16px 0;
}
.sep-sm { margin: 10px 0; }

/* ── Buttons ───────────────────────────────────────────── */
.btn {
  -webkit-app-region: no-drag;
  cursor: pointer;
  width: 210px;
  padding: 11px 20px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-mid);
  font-family: var(--sans);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  border-radius: 999px;
  transition: border-color .18s, color .18s, background .18s;
  margin-top: 9px;
}
.btn:hover {
  border-color: var(--border-hi);
  color: rgba(255,255,255,0.62);
  background: var(--surface-hi);
}
.btn.primary {
  background: #ffffff;
  border-color: #ffffff;
  color: #000000;
  font-weight: 700;
}
.btn.primary:hover {
  background: rgba(255,255,255,0.88);
  border-color: rgba(255,255,255,0.88);
  color: #000000;
}
.btn.sm { width: 160px; font-size: 10px; }
.btn-row { display: flex; gap: 10px; margin-top: 9px; }

/* ── Input ─────────────────────────────────────────────── */
.key-input {
  -webkit-app-region: no-drag;
  width: 100%;
  padding: 11px 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: rgba(255,255,255,0.80);
  font-family: var(--sans);
  font-size: 12px; font-weight: 500;
  border-radius: 999px;
  outline: none;
  margin-top: 16px;
  transition: border-color .18s, background .18s;
  letter-spacing: 0.06em;
  text-align: center;
}
.key-input::placeholder { color: rgba(255,255,255,0.18); font-weight: 400; }
.key-input:focus { border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.06); }

/* ── HWID box ──────────────────────────────────────────── */
.hwid-box {
  width: 100%;
  padding: 11px 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: rgba(255,255,255,0.75);
  font-family: var(--sans);
  font-size: 11px; font-weight: 500;
  border-radius: 999px;
  text-align: center;
  margin-top: 14px;
  letter-spacing: 0.06em;
}

/* ── Status ────────────────────────────────────────────── */
.status {
  font-family: var(--sans);
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.06em;
  min-height: 18px;
  margin-top: 9px;
  text-align: center;
}
.status.ok  { color: #6ab87e; }
.status.err { color: #c47070; }

/* ── Version ───────────────────────────────────────────── */
.version {
  font-family: var(--mono);
  font-size: 10px; font-weight: 400;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.12em;
  margin-top: 4px;
}

/* ── Copy hint ─────────────────────────────────────────── */
.copy-hint {
  font-family: var(--mono);
  font-size: 8px; font-weight: 300;
  color: var(--ok);
  min-height: 16px;
  margin-top: 6px;
  letter-spacing: 0.12em;
  transition: opacity .3s;
}

/* ── Loading dots ──────────────────────────────────────── */
.dots-row { display: flex; align-items: center; gap: 14px; }
.dots { display: flex; gap: 5px; }
.dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--border-hi);
  animation: dotpulse 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes dotpulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40%           { opacity: 0.85; transform: scale(1); }
}

/* ── Launch check ring ─────────────────────────────────── */
.check-ring {
  width: 30px; height: 30px;
  border: 1px solid var(--ok);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--ok);
  font-size: 13px;
  margin-bottom: 12px;
  opacity: 0.75;
}

/* ── Social icons ──────────────────────────────────────── */
.social-icon {
  -webkit-app-region: no-drag;
  display: flex; align-items: center; justify-content: center;
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.35);
  text-decoration: none;
  transition: transform .18s, opacity .18s;
}
.social-icon:hover {
  opacity: 0.8;
  transform: scale(1.08);
}
#toast {
  position: fixed;
  top: 44px;
  right: -300px;
  z-index: 500;
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(10,10,10,0.88);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 12px 18px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  transition: right 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.6s ease;
  opacity: 0;
  pointer-events: none;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}
#toast.show {
  right: 14px;
  opacity: 1;
}
#toast.hide {
  opacity: 0;
  right: 14px;
}
.toast-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(106,184,126,0.12);
  border: 1px solid rgba(106,184,126,0.35);
  display: flex; align-items: center; justify-content: center;
  color: #6ab87e;
  font-size: 11px;
  flex-shrink: 0;
}
.toast-text {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.90);
  letter-spacing: 0.05em;
  white-space: nowrap;
}
</style>
</head>

            font-size: 10px;
            font-weight: 500;
            color: rgba(255,255,255,0.65);
            letter-spacing: 0.08em;

  position: fixed;

  -webkit-app-region: no-drag;
  cursor: pointer;
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.10);
  background: transparent;
  color: rgba(255,255,255,0.35);
  font-size: 16px;
  display: none;
  align-items: center;
  justify-content: center;
  transition: border-color .18s, color .18s, background .18s;
" onmouseenter="this.style.borderColor='rgba(255,255,255,0.22)';this.style.color='rgba(255,255,255,0.75)';this.style.background='rgba(255,255,255,0.05)'"
   onmouseleave="this.style.borderColor='rgba(255,255,255,0.10)';this.style.color='rgba(255,255,255,0.35)';this.style.background='transparent'">

</div>
